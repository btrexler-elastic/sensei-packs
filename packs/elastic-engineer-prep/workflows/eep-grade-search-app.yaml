name: eep-grade-search-app
enabled: true
description: >-
  Grade Developing Search Applications drills. Canonical mode runs the seeded
  multi-key sort + LIMIT query against the alias. Challenge mode runs a learner
  query against the alias and asserts: exactly 2 rows (bottom 2 by score),
  columns[0]='title', columns[1]='score'.
tags: ["elastic-engineer-prep"]

triggers:
  - type: manual

inputs:
  - name: mode
    type: string
    required: true
  - name: alias_name
    type: string
    required: false
  - name: user_query
    type: string
    required: false

steps:
  - name: route_mode
    type: if
    condition: "${{ inputs.mode == 'canonical' }}"
    steps:
      - name: run_canonical
        type: elasticsearch.request
        on-failure:
          continue: true
        with:
          method: POST
          path: "/_query"
          body:
            query: |-
              FROM {{ inputs.alias_name | default: 'eep-app-demo' }}
              | SORT score DESC, title ASC
              | LIMIT 3
              | KEEP title, score
      - name: canonical_error
        type: if
        condition: "${{ steps.run_canonical.error.message.size > 0 }}"
        steps:
          - name: finalize_canonical_error
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "canonical", actual_row_count = 0, hints_json = "[\"Canonical query failed - confirm setup ran and the alias exists.\"]", error_snippet = "{{ steps.run_canonical.error.message }}"
        else:
          - name: canonical_has_rows
            type: if
            condition: "${{ steps.run_canonical.output.values.size == 3 }}"
            steps:
              - name: finalize_canonical_pass
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = true, mode = "canonical", actual_row_count = {{ steps.run_canonical.output.values.size }}, hints_json = "[]", error_snippet = ""
            else:
              - name: finalize_canonical_wrong_rows
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, mode = "canonical", actual_row_count = {{ steps.run_canonical.output.values.size }}, hints_json = "[\"Canonical expected 3 rows from LIMIT 3.\"]", error_snippet = ""
    else:
      - name: route_challenge
        type: if
        condition: "${{ inputs.mode == 'challenge' }}"
        steps:
          - name: gate_query_present
            type: if
            condition: "${{ inputs.user_query.size > 0 }}"
            steps:
              - name: run_challenge
                type: elasticsearch.request
                on-failure:
                  continue: true
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      {{ inputs.user_query }}
              - name: challenge_error
                type: if
                condition: "${{ steps.run_challenge.error.message.size > 0 }}"
                steps:
                  - name: finalize_challenge_error
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: "/_query"
                      body:
                        query: |-
                          ROW passed = false, mode = "challenge", actual_row_count = 0, hints_json = "[\"Your query did not execute. Check ES|QL syntax and the alias name.\"]", error_snippet = "{{ steps.run_challenge.error.message }}"
                else:
                  - name: gate_row_count
                    type: if
                    condition: "${{ steps.run_challenge.output.values.size == 2 }}"
                    steps:
                      - name: gate_col_count
                        type: if
                        condition: "${{ steps.run_challenge.output.columns.size >= 2 }}"
                        steps:
                          - name: gate_col0_title
                            type: if
                            condition: "${{ steps.run_challenge.output.columns[0].name == 'title' }}"
                            steps:
                              - name: gate_col1_score
                                type: if
                                condition: "${{ steps.run_challenge.output.columns[1].name == 'score' }}"
                                steps:
                                  - name: finalize_challenge_pass
                                    type: elasticsearch.request
                                    with:
                                      method: POST
                                      path: "/_query"
                                      body:
                                        query: |-
                                          ROW passed = true, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[]", error_snippet = ""
                                else:
                                  - name: finalize_wrong_col1
                                    type: elasticsearch.request
                                    with:
                                      method: POST
                                      path: "/_query"
                                      body:
                                        query: |-
                                          ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"Second column must be 'score'. Use KEEP title, score.\"]", error_snippet = ""
                            else:
                              - name: finalize_wrong_col0
                                type: elasticsearch.request
                                with:
                                  method: POST
                                  path: "/_query"
                                  body:
                                    query: |-
                                      ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"First column must be 'title'. Use KEEP title, score.\"]", error_snippet = ""
                        else:
                          - name: finalize_wrong_col_count
                            type: elasticsearch.request
                            with:
                              method: POST
                              path: "/_query"
                              body:
                                query: |-
                                  ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"Expected at least two columns (title, score).\"]", error_snippet = ""
                    else:
                      - name: finalize_wrong_row_count
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"Expected 2 rows (the bottom two by score); got {{ steps.run_challenge.output.values.size }}. Adjust SORT direction and LIMIT.\"]", error_snippet = ""
            else:
              - name: finalize_missing_query
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, mode = "challenge", actual_row_count = 0, hints_json = "[\"Provide user_query when mode is challenge.\"]", error_snippet = ""
        else:
          - name: finalize_invalid_mode
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "invalid", actual_row_count = 0, hints_json = "[\"mode must be canonical or challenge.\"]", error_snippet = ""
