name: eep-check-data-management-lab
enabled: true
description: >-
  Validate that the data-management lab resources exist and are wired correctly:
  ILM policy, data-stream template, and stream.
tags: ["elastic-engineer-prep"]

triggers:
  - type: manual

inputs:
  - name: suffix
    type: string
    required: false

steps:
  - name: get_ilm_policy
    type: elasticsearch.request
    on-failure:
      continue: true
    with:
      method: GET
      path: "/_ilm/policy/eep-tsds-{{ inputs.suffix | default: 'demo' }}"

  - name: get_index_template
    type: elasticsearch.request
    on-failure:
      continue: true
    with:
      method: GET
      path: "/_index_template/eep-logs-template-{{ inputs.suffix | default: 'demo' }}"

  - name: get_data_stream
    type: elasticsearch.request
    on-failure:
      continue: true
    with:
      method: GET
      path: "/_data_stream/eep-logs-{{ inputs.suffix | default: 'demo' }}"

  - name: route_policy_ok
    type: if
    condition: "${{ steps.get_ilm_policy.error.message.size == 0 }}"
    steps:
      - name: route_template_ok
        type: if
        condition: "${{ steps.get_index_template.error.message.size == 0 }}"
        steps:
          - name: route_stream_ok
            type: if
            condition: "${{ steps.get_data_stream.error.message.size == 0 }}"
            steps:
              - name: finalize_pass
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = true, hints_json = "[]", error_snippet = ""
            else:
              - name: finalize_missing_stream
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, hints_json = "[\"Data stream missing: create eep-logs-{{ inputs.suffix | default: 'demo' }}.\"]", error_snippet = "{{ steps.get_data_stream.error.message }}"
        else:
          - name: finalize_missing_template
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, hints_json = "[\"Index template missing: create eep-logs-template-{{ inputs.suffix | default: 'demo' }} with data_stream enabled.\"]", error_snippet = "{{ steps.get_index_template.error.message }}"
    else:
      - name: finalize_missing_policy
        type: elasticsearch.request
        with:
          method: POST
          path: "/_query"
          body:
            query: |-
              ROW passed = false, hints_json = "[\"ILM policy missing: create eep-tsds-{{ inputs.suffix | default: 'demo' }}.\"]", error_snippet = "{{ steps.get_ilm_policy.error.message }}"
