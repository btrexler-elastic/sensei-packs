name: eep-grade-search-query
enabled: true
description: >-
  Grade Elastic Engineer Prep search lab queries. Canonical mode runs the seeded
  baseline query. Challenge mode runs a learner query and asserts: exactly 2 rows
  (the two beginner-difficulty docs in the lab), columns[0]='title', columns[1]='points'.
tags: ["elastic-engineer-prep"]

triggers:
  - type: manual

inputs:
  - name: mode
    type: string
    required: true
  - name: index_name
    type: string
    required: false
  - name: user_query
    type: string
    required: false

steps:
  - name: route_mode
    type: if
    condition: "${{ inputs.mode == 'canonical' }}"
    steps:
      - name: run_canonical
        type: elasticsearch.request
        on-failure:
          continue: true
        with:
          method: POST
          path: "/_query"
          body:
            query: |-
              FROM {{ inputs.index_name | default: 'eep-search-lab-demo' }}
              | WHERE published == true
              | WHERE category == "search"
              | MATCH(title, "query")
              | SORT points DESC
              | KEEP title, points
      - name: canonical_error
        type: if
        condition: "${{ steps.run_canonical.error.message.size > 0 }}"
        steps:
          - name: finalize_canonical_error
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "canonical", actual_row_count = 0, hints_json = "[\"Canonical query failed to run. Verify the lab setup and syntax.\"]", error_snippet = "{{ steps.run_canonical.error.message }}"
        else:
          - name: canonical_has_rows
            type: if
            condition: "${{ steps.run_canonical.output.values.size >= 1 }}"
            steps:
              - name: finalize_canonical_pass
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = true, mode = "canonical", actual_row_count = {{ steps.run_canonical.output.values.size }}, hints_json = "[]", error_snippet = ""
            else:
              - name: finalize_canonical_no_rows
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, mode = "canonical", actual_row_count = 0, hints_json = "[\"No rows returned. Confirm setup ran and seed docs exist.\"]", error_snippet = ""
    else:
      - name: route_challenge
        type: if
        condition: "${{ inputs.mode == 'challenge' }}"
        steps:
          - name: gate_query_present
            type: if
            condition: "${{ inputs.user_query.size > 0 }}"
            steps:
              - name: run_challenge
                type: elasticsearch.request
                on-failure:
                  continue: true
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      {{ inputs.user_query }}
              - name: challenge_error
                type: if
                condition: "${{ steps.run_challenge.error.message.size > 0 }}"
                steps:
                  - name: finalize_challenge_error
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: "/_query"
                      body:
                        query: |-
                          ROW passed = false, mode = "challenge", actual_row_count = 0, hints_json = "[\"Your challenge query did not execute. Check ES|QL syntax and index name.\"]", error_snippet = "{{ steps.run_challenge.error.message }}"
                else:
                  - name: gate_row_count
                    type: if
                    condition: "${{ steps.run_challenge.output.values.size == 2 }}"
                    steps:
                      - name: gate_col_count
                        type: if
                        condition: "${{ steps.run_challenge.output.columns.size >= 2 }}"
                        steps:
                          - name: gate_col0_title
                            type: if
                            condition: "${{ steps.run_challenge.output.columns[0].name == 'title' }}"
                            steps:
                              - name: gate_col1_points
                                type: if
                                condition: "${{ steps.run_challenge.output.columns[1].name == 'points' }}"
                                steps:
                                  - name: finalize_challenge_pass
                                    type: elasticsearch.request
                                    with:
                                      method: POST
                                      path: "/_query"
                                      body:
                                        query: |-
                                          ROW passed = true, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[]", error_snippet = ""
                                else:
                                  - name: finalize_wrong_col1
                                    type: elasticsearch.request
                                    with:
                                      method: POST
                                      path: "/_query"
                                      body:
                                        query: |-
                                          ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"Second output column must be 'points'. Use KEEP title, points.\"]", error_snippet = ""
                            else:
                              - name: finalize_wrong_col0
                                type: elasticsearch.request
                                with:
                                  method: POST
                                  path: "/_query"
                                  body:
                                    query: |-
                                      ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"First output column must be 'title'. Use KEEP title, points.\"]", error_snippet = ""
                        else:
                          - name: finalize_wrong_col_count
                            type: elasticsearch.request
                            with:
                              method: POST
                              path: "/_query"
                              body:
                                query: |-
                                  ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"Expected at least two columns (title, points).\"]", error_snippet = ""
                    else:
                      - name: finalize_wrong_row_count
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW passed = false, mode = "challenge", actual_row_count = {{ steps.run_challenge.output.values.size }}, hints_json = "[\"Expected 2 rows (the two beginner-difficulty docs); got {{ steps.run_challenge.output.values.size }}. Recheck WHERE filters.\"]", error_snippet = ""
            else:
              - name: finalize_missing_query
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, mode = "challenge", actual_row_count = 0, hints_json = "[\"Provide user_query when mode is challenge.\"]", error_snippet = ""
        else:
          - name: finalize_invalid_mode
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "invalid", actual_row_count = 0, hints_json = "[\"mode must be canonical or challenge.\"]", error_snippet = ""
