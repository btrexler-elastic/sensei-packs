name: eep-grade-search-query
enabled: true
description: >-
  Grade Searching Data exercises by running a reference Query DSL search against
  the lab index and checking the response shape. Canonical mode verifies the bool
  query returns the expected hit. Challenge mode verifies the beginner-filter query
  returns exactly 2 hits in the correct sort order.
tags: ["elastic-engineer-prep"]

triggers:
  - type: manual

inputs:
  - name: mode
    type: string
    required: true
  - name: index_name
    type: string
    required: false

steps:
  - name: route_mode
    type: if
    condition: "${{ inputs.mode == 'canonical' }}"
    steps:
      - name: run_canonical
        type: elasticsearch.request
        on-failure:
          continue: true
        with:
          method: POST
          path: "/{{ inputs.index_name | default: 'eep-search-lab-demo' }}/_search"
          body:
            query:
              bool:
                must:
                  - match:
                      title: "query"
                filter:
                  - term:
                      published: true
                  - term:
                      category: "search"
            sort:
              - points: desc
            _source:
              - title
              - points

      - name: canonical_error_check
        type: if
        condition: "${{ steps.run_canonical.error.message.size > 0 }}"
        steps:
          - name: finalize_canonical_error
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "canonical", hits_count = 0, first_points = 0, hints_json = "[\"Search request failed - confirm setup ran and the index exists.\"]", error_snippet = "{{ steps.run_canonical.error.message }}"
        else:
          - name: canonical_check_hits
            type: if
            condition: "${{ steps.run_canonical.output.hits.total.value >= 1 }}"
            steps:
              - name: finalize_canonical_pass
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = true, mode = "canonical", hits_count = {{ steps.run_canonical.output.hits.total.value }}, first_points = {{ steps.run_canonical.output.hits.hits[0]._source.points }}, hints_json = "[]", error_snippet = ""
            else:
              - name: finalize_canonical_no_hits
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, mode = "canonical", hits_count = 0, first_points = 0, hints_json = "[\"No hits returned. Confirm the index was set up and seed docs exist.\"]", error_snippet = ""
    else:
      - name: route_challenge
        type: if
        condition: "${{ inputs.mode == 'challenge' }}"
        steps:
          - name: run_challenge
            type: elasticsearch.request
            on-failure:
              continue: true
            with:
              method: POST
              path: "/{{ inputs.index_name | default: 'eep-search-lab-demo' }}/_search"
              body:
                query:
                  bool:
                    filter:
                      - term:
                          difficulty: "beginner"
                      - term:
                          published: true
                sort:
                  - points: desc
                _source:
                  - title
                  - points

          - name: challenge_error_check
            type: if
            condition: "${{ steps.run_challenge.error.message.size > 0 }}"
            steps:
              - name: finalize_challenge_error
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW passed = false, mode = "challenge", hits_count = 0, first_points = 0, hints_json = "[\"Reference search failed - confirm setup ran.\"]", error_snippet = "{{ steps.run_challenge.error.message }}"
            else:
              - name: challenge_check_count
                type: if
                condition: "${{ steps.run_challenge.output.hits.total.value == 2 }}"
                steps:
                  - name: challenge_check_sort
                    type: if
                    condition: "${{ steps.run_challenge.output.hits.hits[0]._source.points == 20 }}"
                    steps:
                      - name: finalize_challenge_pass
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW passed = true, mode = "challenge", hits_count = {{ steps.run_challenge.output.hits.total.value }}, first_points = {{ steps.run_challenge.output.hits.hits[0]._source.points }}, hints_json = "[]", error_snippet = ""
                    else:
                      - name: finalize_wrong_sort
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW passed = false, mode = "challenge", hits_count = {{ steps.run_challenge.output.hits.total.value }}, first_points = {{ steps.run_challenge.output.hits.hits[0]._source.points }}, hints_json = "[\"2 beginner docs found but sort order is wrong - first hit should have points=20. Use sort: points desc.\"]", error_snippet = ""
                else:
                  - name: finalize_wrong_count
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: "/_query"
                      body:
                        query: |-
                          ROW passed = false, mode = "challenge", hits_count = {{ steps.run_challenge.output.hits.total.value }}, first_points = 0, hints_json = "[\"Expected 2 beginner docs but got {{ steps.run_challenge.output.hits.total.value }}. Use a term filter on the difficulty field.\"]", error_snippet = ""
        else:
          - name: finalize_invalid_mode
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "invalid", hits_count = 0, first_points = 0, hints_json = "[\"mode must be canonical or challenge.\"]", error_snippet = ""
