name: eep-run-search-exercises
enabled: true
description: >-
  Run worked search examples against the engineer prep lab index for the learner to study.
  Modes: aggregations (terms+avg sub-agg), runtime_field (runtime_mappings query), async_search.
  Each mode runs a canonical example and reports whether the expected response shape was returned.
tags: ["elastic-engineer-prep"]

triggers:
  - type: manual

inputs:
  - name: mode
    type: string
    required: true
  - name: index_name
    type: string
    required: false

steps:
  - name: route_mode_agg
    type: if
    condition: "${{ inputs.mode == 'aggregations' }}"
    steps:
      - name: run_aggregations
        type: elasticsearch.request
        on-failure:
          continue: true
        with:
          method: POST
          path: "/{{ inputs.index_name | default: 'eep-search-lab-demo' }}/_search"
          body:
            size: 0
            query:
              term:
                published: true
            aggs:
              by_category:
                terms:
                  field: category
                aggs:
                  avg_points:
                    avg:
                      field: points
      - name: agg_error
        type: if
        condition: "${{ steps.run_aggregations.error.message.size > 0 }}"
        steps:
          - name: finalize_agg_error
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW mode = "aggregations", passed = false, hint = "Aggregations request failed - check that the lab index exists.", error_snippet = "{{ steps.run_aggregations.error.message }}"
        else:
          - name: agg_has_buckets
            type: if
            condition: "${{ steps.run_aggregations.output.aggregations.by_category.buckets.size > 0 }}"
            steps:
              - name: finalize_agg_pass
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW mode = "aggregations", passed = true, hint = "Bucket+metric sub-aggregation returned categories with avg_points.", error_snippet = ""
            else:
              - name: finalize_agg_no_buckets
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW mode = "aggregations", passed = false, hint = "Response had no aggregation buckets - lab may be empty.", error_snippet = ""
    else:
      - name: route_mode_runtime
        type: if
        condition: "${{ inputs.mode == 'runtime_field' }}"
        steps:
          - name: run_runtime_field_query
            type: elasticsearch.request
            on-failure:
              continue: true
            with:
              method: POST
              path: "/{{ inputs.index_name | default: 'eep-search-lab-demo' }}/_search"
              body:
                size: 5
                runtime_mappings:
                  point_band:
                    type: keyword
                    script:
                      source: |
                        if (doc['points'].size() == 0) emit('unknown');
                        else if (doc['points'].value >= 30) emit('high');
                        else emit('low');
                query:
                  term:
                    published: true
                _source:
                  includes:
                    - title
                    - points
                fields:
                  - point_band
          - name: runtime_error
            type: if
            condition: "${{ steps.run_runtime_field_query.error.message.size > 0 }}"
            steps:
              - name: finalize_runtime_error
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW mode = "runtime_field", passed = false, hint = "Runtime field query failed - check lab existence and Painless syntax.", error_snippet = "{{ steps.run_runtime_field_query.error.message }}"
            else:
              - name: runtime_has_hits
                type: if
                condition: "${{ steps.run_runtime_field_query.output.hits.hits.size > 0 }}"
                steps:
                  - name: finalize_runtime_pass
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: "/_query"
                      body:
                        query: |-
                          ROW mode = "runtime_field", passed = true, hint = "Runtime field point_band emitted via runtime_mappings; results returned.", error_snippet = ""
                else:
                  - name: finalize_runtime_no_hits
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: "/_query"
                      body:
                        query: |-
                          ROW mode = "runtime_field", passed = false, hint = "Query returned no hits - confirm lab is seeded and published filter holds.", error_snippet = ""
        else:
          - name: route_mode_async
            type: if
            condition: "${{ inputs.mode == 'async_search' }}"
            steps:
              - name: run_async_search
                type: elasticsearch.request
                on-failure:
                  continue: true
                with:
                  method: POST
                  path: "/{{ inputs.index_name | default: 'eep-search-lab-demo' }}/_async_search"
                  body:
                    size: 3
                    sort:
                      - points:
                          order: desc
                    query:
                      bool:
                        must:
                          - match:
                              title: query
                        filter:
                          - term:
                              published: true
              - name: async_error
                type: if
                condition: "${{ steps.run_async_search.error.message.size > 0 }}"
                steps:
                  - name: finalize_async_error
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: "/_query"
                      body:
                        query: |-
                          ROW mode = "async_search", passed = false, hint = "Async search request failed - check the cluster supports async_search and the lab exists.", error_snippet = "{{ steps.run_async_search.error.message }}"
                else:
                  - name: async_has_id
                    type: if
                    condition: "${{ steps.run_async_search.output.id.size > 0 }}"
                    steps:
                      - name: finalize_async_pass
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW mode = "async_search", passed = true, hint = "Async search submitted; an id was returned for polling.", error_snippet = ""
                    else:
                      - name: finalize_async_no_id
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW mode = "async_search", passed = false, hint = "No async search id returned - response shape unexpected.", error_snippet = ""
            else:
              - name: finalize_invalid_mode
                type: elasticsearch.request
                with:
                  method: POST
                  path: "/_query"
                  body:
                    query: |-
                      ROW mode = "invalid", passed = false, hint = "mode must be one of: aggregations, runtime_field, async_search.", error_snippet = ""
