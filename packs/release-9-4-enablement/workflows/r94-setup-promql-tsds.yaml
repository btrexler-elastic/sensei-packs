name: r94-setup-promql-tsds
enabled: true
description: >-
  Create the Sensei PromQL-in-ES|QL teaching TSDS: template + data stream + seeded counter samples every 3 minutes for three instances, verify PROMQL returns rows, return structured scenario metadata for graders/skills.
tags: ["release-9-4-enablement"]

triggers:
  - type: manual

inputs:
  - name: stream_suffix
    type: string
    required: false

steps:
  - name: delete_data_stream
    type: elasticsearch.request
    with:
      method: DELETE
      path: "/_data_stream/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
    on-failure:
      continue: true

  - name: delete_index_template
    type: elasticsearch.request
    with:
      method: DELETE
      path: "/_index_template/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
    on-failure:
      continue: true

  - name: create_index_template
    type: elasticsearch.request
    with:
      method: PUT
      path: "/_index_template/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
      body:
        index_patterns:
          - "sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
        data_stream: {}
        template:
          settings:
            index.mode: time_series
            index.routing_path:
              - instance
          mappings:
            properties:
              "@timestamp":
                type: date
              instance:
                type: keyword
                time_series_dimension: true
              http_requests_total:
                type: long
                time_series_metric: counter

  - name: create_data_stream
    type: elasticsearch.request
    with:
      method: PUT
      path: "/_data_stream/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"

  - name: capture_now
    type: elasticsearch.request
    with:
      method: POST
      path: "/_query"
      body:
        query: "ROW ts = NOW()"

  - name: capture_start
    type: elasticsearch.request
    with:
      method: POST
      path: "/_query"
      body:
        query: "ROW ts = NOW() - 27 minutes"

  - name: ts_minus_27m
    type: elasticsearch.request
    with:
      method: POST
      path: "/_query"
      body:
        query: "ROW ts = NOW() - 27 minutes"

  - name: bulk_slice_27m
    type: elasticsearch.request
    with:
      method: POST
      path: "/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}/_bulk?refresh=true"
      headers:
        Content-Type: application/x-ndjson
      body: |
        {"create":{}}
        {"@timestamp":"{{ steps.ts_minus_27m.output.values | first | first }}","instance":"web-1","http_requests_total":1000}
        {"create":{}}
        {"@timestamp":"{{ steps.ts_minus_27m.output.values | first | first }}","instance":"web-2","http_requests_total":500}
        {"create":{}}
        {"@timestamp":"{{ steps.ts_minus_27m.output.values | first | first }}","instance":"web-3","http_requests_total":2000}

  - name: ts_minus_24m
    type: elasticsearch.request
    with:
