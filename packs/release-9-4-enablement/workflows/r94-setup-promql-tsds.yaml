name: r94-setup-promql-tsds
enabled: true
description: >-
  Create the Sensei PromQL-in-ES|QL teaching TSDS: template + data stream + 30 seeded
  counter samples (10 × 3-min slices × 3 instances). Returns structured scenario metadata.
tags: ["release-9-4-enablement"]

triggers:
  - type: manual

inputs:
  - name: stream_suffix
    type: string
    required: false

steps:
  - name: delete_data_stream
    type: elasticsearch.request
    with:
      method: DELETE
      path: "/_data_stream/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
    on-failure:
      continue: true

  - name: delete_index_template
    type: elasticsearch.request
    with:
      method: DELETE
      path: "/_index_template/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
    on-failure:
      continue: true

  - name: create_index_template
    type: elasticsearch.request
    with:
      method: PUT
      path: "/_index_template/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
      body:
        index_patterns:
          - "sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"
        data_stream: {}
        template:
          settings:
            index.mode: time_series
            index.routing_path:
              - instance
          mappings:
            properties:
              "@timestamp":
                type: date
              instance:
                type: keyword
                time_series_dimension: true
              http_requests_total:
                type: long
                time_series_metric: counter

  - name: create_data_stream
    type: elasticsearch.request
    with:
      method: PUT
      path: "/_data_stream/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}"

  # One ES|QL round-trip gives us all 10 timestamps (t0=oldest, t9=newest).
  # Column order matches definition order, so slice: N, 1 | first gives column N.
  - name: get_timestamps
    type: elasticsearch.request
    with:
      method: POST
      path: "/_query"
      body:
        query: "ROW t0=NOW() - 27 minutes, t1=NOW() - 24 minutes, t2=NOW() - 21 minutes, t3=NOW() - 18 minutes, t4=NOW() - 15 minutes, t5=NOW() - 12 minutes, t6=NOW() - 9 minutes, t7=NOW() - 6 minutes, t8=NOW() - 3 minutes, t9=NOW()"

  # Single bulk: 10 time slices × 3 instances = 30 docs.
  - name: seed_data
    type: elasticsearch.request
    with:
      method: POST
      path: "/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}/_bulk?refresh=true"
      headers:
        Content-Type: application/x-ndjson
      body: |
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | first }}","instance":"web-1","http_requests_total":1000}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | first }}","instance":"web-2","http_requests_total":500}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | first }}","instance":"web-3","http_requests_total":2000}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 1, 1 | first }}","instance":"web-1","http_requests_total":1100}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 1, 1 | first }}","instance":"web-2","http_requests_total":540}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 1, 1 | first }}","instance":"web-3","http_requests_total":2300}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 2, 1 | first }}","instance":"web-1","http_requests_total":1200}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 2, 1 | first }}","instance":"web-2","http_requests_total":580}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 2, 1 | first }}","instance":"web-3","http_requests_total":2600}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 3, 1 | first }}","instance":"web-1","http_requests_total":1300}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 3, 1 | first }}","instance":"web-2","http_requests_total":620}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 3, 1 | first }}","instance":"web-3","http_requests_total":2900}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 4, 1 | first }}","instance":"web-1","http_requests_total":1400}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 4, 1 | first }}","instance":"web-2","http_requests_total":660}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 4, 1 | first }}","instance":"web-3","http_requests_total":3200}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 5, 1 | first }}","instance":"web-1","http_requests_total":1500}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 5, 1 | first }}","instance":"web-2","http_requests_total":700}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 5, 1 | first }}","instance":"web-3","http_requests_total":3500}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 6, 1 | first }}","instance":"web-1","http_requests_total":1600}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 6, 1 | first }}","instance":"web-2","http_requests_total":740}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 6, 1 | first }}","instance":"web-3","http_requests_total":3800}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 7, 1 | first }}","instance":"web-1","http_requests_total":1700}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 7, 1 | first }}","instance":"web-2","http_requests_total":780}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 7, 1 | first }}","instance":"web-3","http_requests_total":4100}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 8, 1 | first }}","instance":"web-1","http_requests_total":1800}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 8, 1 | first }}","instance":"web-2","http_requests_total":820}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 8, 1 | first }}","instance":"web-3","http_requests_total":4400}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 9, 1 | first }}","instance":"web-1","http_requests_total":1900}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 9, 1 | first }}","instance":"web-2","http_requests_total":860}
        {"create":{}}
        {"@timestamp":"{{ steps.get_timestamps.output.values | first | slice: 9, 1 | first }}","instance":"web-3","http_requests_total":4700}

  - name: verify_count
    type: elasticsearch.request
    with:
      method: GET
      path: "/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}/_count"

  - name: verify_promql
    type: elasticsearch.request
    with:
      method: POST
      path: "/_query"
      body:
        query: |-
          PROMQL index=sensei-promql-{{ inputs.stream_suffix | default: 'demo' }} scrape_interval=3m step=3m
            req_rate=(sum by (instance) (rate(http_requests_total)))
          | SORT req_rate DESC

  - name: gate_results
    type: if
    condition: "${{ steps.verify_count.output.count >= 25 }}"
    steps:
      - name: gate_promql_nonempty
        type: if
        condition: "${{ steps.verify_promql.output.values.size > 0 }}"
        steps:
          - name: finalize_summary
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW stream_name = "sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}", time_window_iso_start = "{{ steps.get_timestamps.output.values | first | first }}", time_window_iso_end = "{{ steps.get_timestamps.output.values | first | slice: 9, 1 | first }}", instances = "web-1,web-2,web-3", scrape_interval_minutes = 3, doc_count = {{ steps.verify_count.output.count }}, canonical_query = "PROMQL index=sensei-promql-{{ inputs.stream_suffix | default: 'demo' }} scrape_interval=3m step=3m\n  req_rate=(sum by (instance) (rate(http_requests_total)))\n| SORT req_rate DESC"
        else:
          - name: abort_empty_promql
            type: elasticsearch.request
            with:
              method: GET
              path: "/__sensei_promql_setup_failed__/empty-promql"
    else:
      - name: abort_low_doc_count
        type: elasticsearch.request
        with:
          method: GET
          path: "/__sensei_promql_setup_failed__/low-doc-count"
