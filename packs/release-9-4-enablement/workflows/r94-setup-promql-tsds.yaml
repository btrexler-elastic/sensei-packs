  - name: verify_count
    type: elasticsearch.request
    with:
      method: GET
      path: "/sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}/_count"

  - name: verify_promql
    type: elasticsearch.request
    with:
      method: POST
      path: "/_query"
      body:
        query: |-
          PROMQL index=sensei-promql-{{ inputs.stream_suffix | default: 'demo' }} scrape_interval=3m step=3m
            req_rate=(sum by (instance) (rate(http_requests_total)))
          | SORT req_rate DESC
  - name: gate_enough_docs
    type: if
    condition: "${{ steps.verify_count.output.count >= 25 }}"
    steps:
      - name: gate_promql_nonempty
        type: if
        condition: "${{ steps.verify_promql.output.values.size > 0 }}"
        steps:
          - name: finalize_summary
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW stream_name = "sensei-promql-{{ inputs.stream_suffix | default: 'demo' }}", time_window_iso_start = "{{ steps.capture_start.output.values | first | first }}", time_window_iso_end = "{{ steps.capture_now.output.values | first | first }}", instances = "web-1,web-2,web-3", scrape_interval_minutes = 3, doc_count = {{ steps.verify_count.output.count }}, canonical_query = "PROMQL index=sensei-promql-{{ inputs.stream_suffix | default: 'demo' }} scrape_interval=3m step=3m\n  req_rate=(sum by (instance) (rate(http_requests_total)))\n| SORT req_rate DESC"
        else:
          - name: abort_empty_promql
            type: elasticsearch.request
            with:
              method: GET
              path: "/__sensei_promql_setup_failed__/empty-promql"
    else:
      - name: abort_low_doc_count
        type: elasticsearch.request
        with:
          method: GET
          path: "/__sensei_promql_setup_failed__/low-doc-count"
