                                          body:
                                            query: |-
                                              ROW passed = true, mode = "canonical", expected_json = "{\"min_rows\":1,\"required_column\":\"req_rate\"}", actual_row_count = {{ steps.run_canonical_query.output.values.size }}, actual_json = "{\"row_count\": {{ steps.run_canonical_query.output.values.size }} }", hints_json = "[]", error_snippet = ""
                                    else:
