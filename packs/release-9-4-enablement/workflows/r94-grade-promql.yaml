name: r94-grade-promql
enabled: true
description: >-
  Grade PromQL-in-ES|QL for Sensei release-9-4-enablement: canonical mode verifies the seeded TSDS scenario returns runnable PromQL rows with a req_rate column;
  challenge mode runs a learner query and checks output shape (<=2 rows, aggregated column name substring). Returns structured ROW output for Agent Builder tools.
tags: ["release-9-4-enablement"]

triggers:
  - type: manual

inputs:
  - name: mode
    type: string
    required: true
  - name: stream_name
    type: string
    required: false
  - name: user_query
    type: string
    required: false
  - name: time_window_iso_start
    type: string
    required: false
  - name: time_window_iso_end
    type: string
    required: false

steps:
  - name: route_mode
    type: if
    condition: "${{ inputs.mode == 'canonical' }}"
    steps:
      - name: run_canonical_query
        type: elasticsearch.request
        on-failure:
          continue: true
        with:
          method: POST
          path: "/_query"
          body:
            query: |-
              PROMQL index={{ inputs.stream_name | default: 'sensei-promql-demo' }} scrape_interval=3m step=3m
                req_rate=(sum by (instance) (rate(http_requests_total)))
              | SORT req_rate DESC
      - name: canonical_branch_error
        type: if
        condition: "${{ steps.run_canonical_query.error.message.size > 0 }}"
        steps:
          - name: finalize_canonical_query_failed
            type: elasticsearch.request
            with:
              method: POST
              path: "/_query"
              body:
                query: |-
                  ROW passed = false, mode = "canonical", expected_json = "{\"min_rows\":1,\"required_column\":\"req_rate\"}", actual_row_count = {{ steps.run_canonical_query.output.values.size }}, actual_json = "{}", hints_json = "[\"The query didn't execute - check syntax.\"]", error_snippet = "{{ steps.run_canonical_query.error.message }}"
        else:
          - name: canonical_branch_nonempty
            type: if
            condition: "${{ steps.run_canonical_query.output.values.size >= 1 }}"
            steps:
              - name: canonical_guard_col0
                type: if
                condition: "${{ steps.run_canonical_query.output.columns.size > 0 }}"
                steps:
                  - name: canonical_chk_0_req_rate
                    type: if
                    condition: "${{ steps.run_canonical_query.output.columns[0].name == 'req_rate' }}"
                    steps:
                      - name: canonical_pass_col0
                        type: elasticsearch.request
                        with:
                          method: POST
                          path: "/_query"
                          body:
                            query: |-
                              ROW passed = true, mode = "canonical", expected_json = "{\"min_rows\":1,\"required_column\":\"req_rate\"}", actual_row_count = {{ steps.run_canonical_query.output.values.size }}, actual_json = "{\"row_count\": {{ steps.run_canonical_query.output.values.size }} }", hints_json = "[]", error_snippet = ""
                    else:
                      - name: canonical_guard_col1
                        type: if
                        condition: "${{ steps.run_canonical_query.output.columns.size > 1 }}"
                        steps:
                          - name: canonical_chk_1_req_rate
                            type: if
                            condition: "${{ steps.run_canonical_query.output.columns[1].name == 'req_rate' }}"
                            steps:
                              - name: canonical_pass_col1
                                type: elasticsearch.request
                                with:
                                  method: POST
                                  path: "/_query"
                                  body:
                                    query: |-
                                      ROW passed = true, mode = "canonical", expected_json = "{\"min_rows\":1,\"required_column\":\"req_rate\"}", actual_row_count = {{ steps.run_canonical_query.output.values.size }}, actual_json = "{\"row_count\": {{ steps.run_canonical_query.output.values.size }} }", hints_json = "[]", error_snippet = ""
                            else:
                              - name: canonical_guard_col2
                                type: if
                                condition: "${{ steps.run_canonical_query.output.columns.size > 2 }}"
                                steps:
